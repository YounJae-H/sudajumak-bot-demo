name: Deploy Sudajumak App Guide

on:
  push:
    branches:
      - main
    paths:
      - app-guide/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload guide
        uses: actions/upload-pages-artifact@v3
        with:
          path: app-guide

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
